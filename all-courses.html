<!DOCTYPE html>
<html lang="bn">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>সব কোর্স — ব্যাবেজ একাডেমি</title>
    <link rel="icon" href="assets/images/logo.png" type="image/png" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Li Ador Noirrit', 'sans-serif'] },
                    colors: {
                        brand: { 50: '#f0fdf4', 100: '#dcfce7', 500: '#22c55e', 600: '#16a34a', 700: '#15803d', 800: '#166534', 900: '#14532d' },
                        accent: '#f59e0b',
                    },
                },
            },
        };
    </script>
    <link rel="stylesheet" href="css/site.css" />
</head>

<body data-page="all-courses" class="text-gray-800 antialiased overflow-x-hidden site-ready">

    <div id="scroll-progress" aria-hidden="true"></div>

    <header id="site-header"></header>

    <main>
        <section class="course-hero-light relative overflow-hidden">
            <div class="course-soft-grid absolute inset-0"></div>
            <div class="course-soft-block w-28 h-28 top-12 right-[10%] opacity-70 hidden md:block"></div>
            <div class="course-soft-block w-20 h-20 top-28 right-[24%] opacity-50 hidden lg:block"></div>
            <div class="course-soft-block w-32 h-32 bottom-6 left-[8%] opacity-55 hidden md:block"></div>

            <div class="relative max-w-7xl mx-auto px-6 lg:px-8 py-10 md:py-14">
                <nav class="text-sm text-gray-500 flex flex-wrap items-center gap-2" aria-label="Breadcrumb">
                    <a href="index.html" class="hover:text-brand-700 transition">হোম</a>
                    <span class="text-gray-300">/</span>
                    <span class="text-brand-800 font-medium">সব কোর্স</span>
                </nav>

                <div class="mt-8 md:mt-10 max-w-3xl">
                    <p class="text-accent font-bold tracking-wider text-sm uppercase">কোর্সসমূহ</p>
                    <h1 class="font-bold text-gray-900 text-3xl md:text-[2.75rem] lg:text-5xl mt-3 leading-tight">
                        তোমার পছন্দের কোর্স বেছে নাও
                    </h1>
                    <p class="mt-5 text-gray-600 text-base md:text-lg leading-relaxed">
                        ICT সিলেবাস, প্রোগ্রামিং ও NHSPC প্রস্তুতি — সব কোর্স বাংলায়, হাই স্কুল শিক্ষার্থীদের জন্য তৈরি।
                    </p>
                    <div class="flex flex-wrap gap-3 mt-8">
                        <span class="glass-pill px-4 py-2.5 rounded-2xl text-sm text-gray-700">
                            <i class="fa-solid fa-book-open text-brand-600 mr-2"></i><span id="course-count">৩</span>টি কোর্স
                        </span>
                        <span class="glass-pill px-4 py-2.5 rounded-2xl text-sm text-gray-700">
                            <i class="fa-solid fa-gift text-brand-600 mr-2"></i>বিনামূল্যে শুরু
                        </span>
                        <span class="glass-pill px-4 py-2.5 rounded-2xl text-sm text-gray-700">
                            <i class="fa-solid fa-language text-brand-600 mr-2"></i>সম্পূর্ণ বাংলা
                        </span>
                    </div>
                </div>
            </div>
        </section>

        <section class="max-w-7xl mx-auto px-6 lg:px-8 py-14 md:py-16 pb-16">
            <div id="all-course-grid" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-7"></div>
        </section>
    </main>

    <footer id="site-footer"></footer>

    <script src="js/courses.js"></script>
    <script src="js/site.js"></script>
    <script>
        document.getElementById('course-count').textContent = String(COURSES.length);
        renderCourseCards('all-course-grid');
        initSite();
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="bn">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>কোর্সে ভর্তি — ব্যাবেজ একাডেমি</title>
    <link rel="icon" href="assets/images/logo.png" type="image/png" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Li Ador Noirrit', 'sans-serif'] },
                    colors: {
                        brand: { 50: '#f0fdf4', 100: '#dcfce7', 500: '#22c55e', 600: '#16a34a', 700: '#15803d', 800: '#166534', 900: '#14532d' },
                        accent: '#f59e0b',
                    },
                },
            },
        };
    </script>
    <link rel="stylesheet" href="css/site.css" />
</head>

<body data-page="enrollment" class="text-gray-800 antialiased overflow-x-hidden site-ready">

    <div id="scroll-progress" aria-hidden="true"></div>

    <header id="site-header"></header>

    <main>
        <section class="course-hero-light relative overflow-hidden">
            <div class="course-soft-grid absolute inset-0"></div>
            <div class="relative max-w-7xl mx-auto px-6 lg:px-8 py-10 md:py-14">
                <nav class="text-sm text-gray-500 flex flex-wrap items-center gap-2" aria-label="Breadcrumb">
                    <a href="index.html" class="hover:text-brand-700 transition">হোম</a>
                    <span class="text-gray-300">/</span>
                    <span class="text-brand-800 font-medium">ভর্তি ফর্ম</span>
                </nav>
                <div class="mt-8">
                    <p class="text-accent font-bold tracking-wider text-sm uppercase">ভর্তি</p>
                    <h1 class="font-bold text-gray-900 text-3xl md:text-4xl mt-2 leading-tight">কোর্সে ভর্তি ফর্ম</h1>
                    <p class="mt-4 text-gray-600 leading-relaxed max-w-3xl">
                        নিচের ফর্মটি পূরণ করো। আমরা তোমার সাথে WhatsApp-এ যোগাযোগ করব।
                    </p>
                </div>
            </div>
        </section>

        <section class="w-full px-6 lg:px-8 pb-16 pt-8 md:pt-12">
            <form id="enrollment-form"
                class="reveal w-full max-w-7xl mx-auto rounded-2xl border border-gray-100 bg-white shadow-sm p-6 md:p-10 lg:p-12 card-leaf-bg grid md:grid-cols-2 gap-x-8 gap-y-5"
                onsubmit="handleEnrollmentSubmit(event)">
                <div class="md:col-span-2">
                    <label class="form-label" for="name">পূর্ণ নাম *</label>
                    <input class="form-input" type="text" id="name" name="name" required placeholder="তোমার পূর্ণ নাম" />
                </div>
                <div>
                    <label class="form-label" for="email">ইমেইল *</label>
                    <input class="form-input" type="email" id="email" name="email" required placeholder="example@email.com" />
                </div>
                <div>
                    <label class="form-label" for="whatsapp">WhatsApp নম্বর *</label>
                    <input class="form-input" type="tel" id="whatsapp" name="whatsapp" required placeholder="০১XXXXXXXXX" />
                </div>
                <div>
                    <label class="form-label" for="school">স্কুলের নাম *</label>
                    <input class="form-input" type="text" id="school" name="school" required placeholder="তোমার স্কুল/কলেজের নাম" />
                </div>
                <div>
                    <label class="form-label" for="course">কোর্স *</label>
                    <select class="form-input" id="course" name="course" required></select>
                </div>
                <div class="md:col-span-2">
                    <label class="form-label" for="address">ঠিকানা *</label>
                    <textarea class="form-input form-textarea" id="address" name="address" required
                        placeholder="বাড়ি/রোড, এলাকা, জেলা"></textarea>
                </div>

                <div class="md:col-span-2 rounded-xl border border-pink-100 bg-pink-50/60 p-4 md:p-5 text-sm text-gray-700">
                    <p class="font-semibold text-gray-900 flex items-center gap-2">
                        <i class="fa-solid fa-mobile-screen text-pink-600"></i> bKash পেমেন্ট
                    </p>
                    <p class="mt-2 leading-relaxed">
                        Send Money করো: <span class="font-bold text-gray-900">01712383115</span> (Personal)
                    </p>
                    <p class="mt-1 text-gray-500">পেমেন্টের পর নিচে Transaction ID লেখো।</p>
                </div>

                <div class="md:col-span-2">
                    <label class="form-label" for="bkash_trx">bKash Transaction ID *</label>
                    <input class="form-input" type="text" id="bkash_trx" name="bkash_trx" required placeholder="উদা: 8NXXXXXXXX" />
                </div>

                <div class="md:col-span-2 flex flex-col items-start md:items-end gap-4 pt-2">
                    <label class="flex items-start gap-3 text-sm text-gray-600 cursor-pointer md:text-right">
                        <input type="checkbox" name="terms" required class="mt-1 accent-brand-600 shrink-0" />
                        <span>
                            আমি <a href="terms-and-conditions.html" class="text-brand-700 hover:underline" target="_blank">শর্তাবলী</a>
                            ও <a href="privacy-policy.html" class="text-brand-700 hover:underline" target="_blank">গোপনীয়তা নীতি</a> পড়েছি ও সম্মত।
                        </span>
                    </label>
                    <button type="submit" class="btn-gradient btn-shine w-full md:w-auto md:min-w-[280px] py-3.5 px-10 rounded-full text-white text-[15px]">
                        আবেদন জমা দাও
                    </button>
                </div>
            </form>
        </section>
    </main>

    <footer id="site-footer"></footer>

    <script src="js/courses.js"></script>
    <script src="js/site.js"></script>
    <script>
        (function () {
            const preselect = new URLSearchParams(window.location.search).get('course') || '';
            populateCourseSelect(document.getElementById('course'), preselect);
            initSite();
        })();
    </script>
</body>

</html>
